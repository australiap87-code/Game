<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Juego Acción Móvil</title>
<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    touch-action: none;
  }

  canvas {
    display: block;
    background: #111;
  }

  .controls {
    position: fixed;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: space-around;
  }

  button {
    width: 80px;
    height: 80px;
    font-size: 30px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.2);
    color: white;
  }

  button:active {
    background: rgba(255,255,255,0.5);
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div class="controls">
  <button id="left">◀</button>
  <button id="shoot">🔥</button>
  <button id="right">▶</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = {
  x: canvas.width / 2 - 25,
  y: canvas.height - 80,
  width: 50,
  height: 50,
  speed: 7,
  color: "cyan"
};

let bullets = [];
let enemies = [];
let score = 0;
let gameOver = false;

let moveLeft = false;
let moveRight = false;

document.getElementById("left").ontouchstart = () => moveLeft = true;
document.getElementById("left").ontouchend = () => moveLeft = false;

document.getElementById("right").ontouchstart = () => moveRight = true;
document.getElementById("right").ontouchend = () => moveRight = false;

document.getElementById("shoot").ontouchstart = shoot;

function shoot() {
  if (gameOver) return;
  bullets.push({
    x: player.x + player.width / 2 - 5,
    y: player.y,
    width: 10,
    height: 20,
    speed: 10,
    color: "yellow"
  });
}

function spawnEnemy() {
  enemies.push({
    x: Math.random() * (canvas.width - 40),
    y: -40,
    width: 40,
    height: 40,
    speed: 2 + Math.random() * 3,
    color: "red"
  });
}

setInterval(spawnEnemy, 1000);

function collision(a, b) {
  return (
    a.x < b.x + b.width &&
    a.x + a.width > b.x &&
    a.y < b.y + b.height &&
    a.y + a.height > b.y
  );
}

function update() {
  if (gameOver) return;

  if (moveLeft && player.x > 0)
    player.x -= player.speed;

  if (moveRight && player.x < canvas.width - player.width)
    player.x += player.speed;

  bullets.forEach((b, i) => {
    b.y -= b.speed;
    if (b.y < 0) bullets.splice(i, 1);
  });

  enemies.forEach((e, ei) => {
    e.y += e.speed;

    if (collision(player, e)) {
      gameOver = true;
    }

    bullets.forEach((b, bi) => {
      if (collision(b, e)) {
        enemies.splice(ei, 1);
        bullets.splice(bi, 1);
        score += 10;
      }
    });

    if (e.y > canvas.height)
      enemies.splice(ei, 1);
  });
}

function drawRect(obj) {
  ctx.fillStyle = obj.color;
  ctx.fillRect(obj.x, obj.y, obj.width, obj.height);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawRect(player);
  bullets.forEach(drawRect);
  enemies.forEach(drawRect);

  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Puntos: " + score, 20, 30);

  if (gameOver) {
    ctx.font = "40px Arial";
    ctx.fillText("GAME OVER", canvas.width/2 - 120, canvas.height/2);
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
